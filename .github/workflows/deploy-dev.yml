name: Deploy to dev

on:
  push:
    branches: [develop]
  workflow_dispatch:

env:
  REGION: europe-west1
  PROJECT: ela-dp-dev
  AR_REPO: ela-dp-ingestion
  IMAGE: ingestion
  JOB_NAME: ela-dp-ingestion

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/875275187211/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: data-fetcher@ela-dp-dev.iam.gserviceaccount.com

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT }}/${{ env.AR_REPO }}/${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy Cloud Run Job
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT }}/${{ env.AR_REPO }}/${{ env.IMAGE }}:${{ github.sha }}"
          if gcloud run jobs describe ${{ env.JOB_NAME }} --region ${{ env.REGION }} --project ${{ env.PROJECT }} > /dev/null 2>&1; then
            gcloud run jobs update ${{ env.JOB_NAME }} \
              --image "$IMAGE" \
              --region ${{ env.REGION }} \
              --project ${{ env.PROJECT }}
          else
            gcloud run jobs create ${{ env.JOB_NAME }} \
              --image "$IMAGE" \
              --region ${{ env.REGION }} \
              --project ${{ env.PROJECT }} \
              --args="--env" --args="dev" \
              --args="--source" --args="spotify" \
              --args="--data-types" --args="recently_played" \
              --args="--output-dir" --args="gs://ela-dp-dev"
          fi
