name: Deploy to dev

on:
  push:
    branches: [develop]
  workflow_dispatch:

env:
  REGION: europe-west1
  PROJECT: ela-dp-dev
  AR_REPO: ela-dp-ingestion
  IMAGE: ingestion

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/875275187211/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: data-fetcher@ela-dp-dev.iam.gserviceaccount.com

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT }}/${{ env.AR_REPO }}/${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/875275187211/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: data-fetcher@ela-dp-dev.iam.gserviceaccount.com

      - name: Update all Cloud Run Jobs
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT }}/${{ env.AR_REPO }}/${{ env.IMAGE }}:${{ github.sha }}"

          JOBS=$(gcloud run jobs list \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT }} \
            --format="value(metadata.name)" | grep -E "^ela-dp-(garmin|spotify)-")

          for JOB_NAME in $JOBS; do
            echo "Updating $JOB_NAME..."
            gcloud run jobs update "$JOB_NAME" \
              --image "$IMAGE" \
              --region ${{ env.REGION }} \
              --project ${{ env.PROJECT }}
          done
