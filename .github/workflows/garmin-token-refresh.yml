name: Refresh Garmin tokens

on:
  schedule:
    - cron: "0 0 * * *" # Every day at midnight UTC
  workflow_dispatch:

jobs:
  refresh-dev:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install garminconnect==0.2.40 google-cloud-storage==3.9.0

      - name: Authenticate to GCP (dev)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/875275187211/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: data-fetcher@ela-dp-dev.iam.gserviceaccount.com

      - name: Refresh tokens (dev)
        env:
          GARMIN_USERNAME: ${{ secrets.GARMIN_USERNAME }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: python scripts/refresh_garmin_tokens.py --env dev

  refresh-prd:
    needs: refresh-dev
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install garminconnect==0.2.40 google-cloud-storage==3.9.0

      - name: Authenticate to GCP (prd)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/528417450932/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: data-fetcher@ela-dp-prd.iam.gserviceaccount.com

      - name: Refresh tokens (prd)
        env:
          GARMIN_USERNAME: ${{ secrets.GARMIN_USERNAME }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: python scripts/refresh_garmin_tokens.py --env prd
