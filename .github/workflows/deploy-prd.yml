name: Deploy to prd

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGION: europe-west1
  PROJECT: ela-dp-prd
  AR_REPO: ela-dp-ingestion
  IMAGE: ingestion

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/528417450932/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: data-fetcher@ela-dp-prd.iam.gserviceaccount.com

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT }}/${{ env.AR_REPO }}/${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    strategy:
      matrix:
        data_type:
          - recently_played
          - saved_tracks
          - saved_albums
          - followed_artists
          - playlists
          - user_profile
          - top_tracks
          - top_artists

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/528417450932/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: data-fetcher@ela-dp-prd.iam.gserviceaccount.com

      - name: Deploy Cloud Run Job — ${{ matrix.data_type }}
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT }}/${{ env.AR_REPO }}/${{ env.IMAGE }}:${{ github.sha }}"
          JOB_NAME="ela-dp-spotify-$(echo '${{ matrix.data_type }}' | tr '_' '-')"

          if gcloud run jobs describe "$JOB_NAME" --region ${{ env.REGION }} --project ${{ env.PROJECT }} > /dev/null 2>&1; then
            gcloud run jobs update "$JOB_NAME" \
              --image "$IMAGE" \
              --region ${{ env.REGION }} \
              --project ${{ env.PROJECT }}
          else
            gcloud run jobs create "$JOB_NAME" \
              --image "$IMAGE" \
              --region ${{ env.REGION }} \
              --project ${{ env.PROJECT }} \
              --args="--env" --args="prd" \
              --args="--source" --args="spotify" \
              --args="--data-types" --args="${{ matrix.data_type }}" \
              --args="--output-dir" --args="gs://ela-dp-prd"
          fi
